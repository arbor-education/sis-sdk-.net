name: Linting

on:
  pull_request:

jobs: 
  lint:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Dotnet
        uses: actions/setup-dotnet@v5
        with: 
          dotnet-version: 6.0.x
      - name: Lint Code Style
        run: dotnet format --verify-no-changes

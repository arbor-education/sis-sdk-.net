repos:
  - repo: local
    hooks:
      - id: trufflehog
        name: TruffleHog
        description: Detect secrets using TruffleHog.
        entry: bash -c 'trufflehog git file://. --since-commit HEAD --results=verified --fail --no-update'
        language: system
        pass_filenames: false
        stages: ["pre-commit", "pre-push"]
